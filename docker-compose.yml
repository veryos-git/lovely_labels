# Local one-liner: `docker compose up --build`
# Builds the same Dockerfile that Render uses and exposes the app on
# http://localhost:8080 — handy for reproducing the prod container on any
# machine without installing Deno / Node / ImageMagick locally.
#
# Config comes from .env if present (the SAME file the `deno task`s read —
# Compose auto-loads ./.env for the ${...} below), with the defaults here as
# fallback. So `docker compose up` works whether or not you ran
# `cp .env.example .env`, and a custom PORT flows through to the port mapping
# and the healthcheck.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lovely-labels:local
    container_name: lovely-labels
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: "${PORT:-8080}"
      MAGICK_BIN: "${MAGICK_BIN:-magick}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "deno eval 'await fetch(\"http://localhost:${PORT:-8080}/api/health\").then(r => r.ok ? Deno.exit(0) : Deno.exit(1))'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
