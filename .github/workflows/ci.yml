name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.4

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint server (deno fmt --check)
        run: deno fmt --check

      - name: Type-check server
        run: deno check server.ts

      - name: Build client (vue-tsc + vite)
        working-directory: client
        run: npm run build

      - name: Build Docker image
        run: docker build -t lovely-labels:ci .

      - name: Smoke-test container (boot + /api/health + /api/fonts)
        run: |
          docker run -d --name lovely-labels-smoke -p 18080:8080 lovely-labels:ci
          # Poll the health endpoint until it answers or we hit the timeout.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18080/api/health > /dev/null; then
              echo "container healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "container failed to become healthy" >&2
              docker logs lovely-labels-smoke
              docker rm -f lovely-labels-smoke
              exit 1
            fi
            sleep 1
          done
          # Sanity-check a content endpoint too — proves the assets shipped.
          curl -fsS http://localhost:18080/api/fonts | grep -q CelticsModern
          docker rm -f lovely-labels-smoke

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skipping deploy trigger."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
